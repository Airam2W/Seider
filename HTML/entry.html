<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seider - Entry</title>

    <link rel="stylesheet" href="/CSS/styles.css">
    <link rel="stylesheet" href="/CSS/entry.css">
</head>
<body>

    <header class="header">
        <h2>New Entry</h2>
    </header>

    <main class="entry-container">


        <!-- ITEMS TABLE -->
        <div id="itemsContainer">
            <h3>Table:</h3>
        </div>

        <button id="btnAddGroup">+ Add Group</button>

        <!-- NEW TAG MODAL -->
        <div id="newTagModal" class="modal hidden">
            <div class="modal-content">
                <h3>Create New Tag</h3>
                <input id="newTagName" type="text" placeholder="Tag name">
                <div class="modal-actions">
                    <button id="btnCreateTag">Create</button>
                    <button id="btnCancelTag">Cancel</button>
                </div>
            </div>
        </div>

        <!-- NEW SUBTAG MODAL -->
         <div id="newSubtagModal" class="modal hidden">
            <div class="modal-content">
                <h3>Create New Subtag</h3>
                <input id="newSubtagName" type="text" placeholder="Subtag name">
                <div class="modal-actions">
                    <button id="btnCreateSubtag">Create</button>
                    <button id="btnCancelSubtag">Cancel</button>
                </div>
            </div>
        </div>

        <!-- NOTES -->
        <div class="notes-box">
            <h3>Notes:</h3>
            <textarea id="notes" placeholder="Add any notes about this entry..."></textarea>
        </div>

        <!-- TOTAL -->
        <div class="total-box">
            <h3>Total:</h3>
            <span id="totalAmount">0</span>
        </div>

        <!-- ACTIONS -->
        <div class="actions">
            <button id="btnSave">Save</button>
            <button id="btnCancel">Back</button>
        </div>

    </main>

    <script type="module" src="/JS/entry.js"></script>
    <script type="module" src="/JS/auth-guard.js"></script>
</body>
</html>
